name: 학생 수업 당일 알림

on:
  # schedule:
  #   - cron: '0 23 * * *'  # 매일 08:00 KST (= 전날 23:00 UTC)
  workflow_dispatch:          # 수동 실행 가능

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 학생 당일 수업 리마인더 발송
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          SOLAPI_API_KEY: ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
          KAKAO_PFID: ${{ secrets.KAKAO_PFID }}
          KAKAO_TPL_STU_TODAY: ${{ secrets.KAKAO_TPL_STU_TODAY }}
        run: node notify_student_today.mjs
