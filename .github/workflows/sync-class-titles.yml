name: 수업 제목 자동 동기화

on:
  schedule:
    - cron: '*/30 * * * *'  # 30분마다 실행 (웹훅 누락 대비 fallback)
  workflow_dispatch:          # 수동 실행 가능
  repository_dispatch:
    types: [sync-class-titles]  # Worker 웹훅 핸들러에서 직접 실행 (미래 확장용)

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 수업 제목 자동 동기화 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOPIC_CRITICAL: ${{ secrets.NTFY_TOPIC_CRITICAL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: node sync_class_titles.mjs
