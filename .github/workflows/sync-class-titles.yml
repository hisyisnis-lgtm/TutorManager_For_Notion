name: 수업 제목 자동 동기화

on:
  # Worker 웹훅(handleNotionWebhook → syncClassTitle)이 즉시 처리하므로 폴링 cron 제거.
  # 웹훅 누락 시 안전망으로 6시간마다만 실행.
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [sync-class-titles]

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 수업 제목 자동 동기화 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOPIC_CRITICAL: ${{ secrets.NTFY_TOPIC_CRITICAL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: node sync_class_titles.mjs
