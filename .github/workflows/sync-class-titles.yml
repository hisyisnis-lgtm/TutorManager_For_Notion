name: 수업 제목 자동 동기화

on:
  schedule:
    - cron: '*/30 * * * *'  # 30분마다 실행
  workflow_dispatch:          # 수동 실행 가능

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 수업 제목 자동 동기화 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node sync_class_titles.mjs
