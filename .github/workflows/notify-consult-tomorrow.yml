name: 무료상담/원데이클래스 전날 알림

on:
  schedule:
    - cron: '0 10 * * *'  # 매일 19:00 KST (= 10:00 UTC)
  workflow_dispatch:          # 수동 실행 가능

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: 무료상담/원데이클래스 전날 리마인더 발송
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOPIC_CRITICAL: ${{ secrets.NTFY_TOPIC_CRITICAL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          SOLAPI_API_KEY: ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
          KAKAO_PFID: ${{ secrets.KAKAO_PFID }}
          KAKAO_TPL_CONSULT_TOMORROW: ${{ secrets.KAKAO_TPL_CONSULT_TOMORROW }}
          KAKAO_TPL_ONEDAY_TOMORROW: ${{ secrets.KAKAO_TPL_ONEDAY_TOMORROW }}
        run: node notify_consult_tomorrow.mjs
