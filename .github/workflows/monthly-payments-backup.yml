name: 월간 결제 내역 백업 (R2, 5년 보관)

# 매월 1일 KST 05:00 (= 매월 1일 UTC 20:00 (전월 마지막날))
# 한국 세법(부가세법/소득세법) 거래 증빙 5년 보존 의무 대응.
# 다른 백업과 시간대 분리 (주간 03:00, 아카이브 04:00, 결제 05:00 KST)
on:
  schedule:
    - cron: '0 20 28-31 * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monthly-payments-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 매월 마지막날 KST 확인
        id: date_check
        run: |
          KST_TOMORROW=$(TZ='Asia/Seoul' date -d 'tomorrow' +%d)
          if [ "$KST_TOMORROW" = "01" ]; then
            echo "is_last_day=true" >> "$GITHUB_OUTPUT"
            echo "✅ KST 기준 오늘이 월 마지막날 — 결제 백업 실행"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_last_day=true" >> "$GITHUB_OUTPUT"
            echo "✅ 수동 트리거 — 결제 백업 실행"
          else
            echo "is_last_day=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ KST 기준 마지막날 아님 (내일=${KST_TOMORROW}일) — 건너뜀"
          fi

      - uses: actions/checkout@v6
        if: steps.date_check.outputs.is_last_day == 'true'

      - uses: actions/setup-node@v6
        if: steps.date_check.outputs.is_last_day == 'true'
        with:
          node-version: '24'

      - name: 결제 DB 백업 → 압축 파일 생성
        if: steps.date_check.outputs.is_last_day == 'true'
        id: backup
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOPIC_CRITICAL: ${{ secrets.NTFY_TOPIC_CRITICAL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          BACKUP_OUTPUT_PATH: /tmp/notion-payments.json.gz
        run: node backup_payments_to_r2.mjs

      - name: R2 시크릿 등록 여부 확인
        if: steps.date_check.outputs.is_last_day == 'true'
        id: check_secrets
        env:
          CLOUDFLARE_R2_API_TOKEN: ${{ secrets.CLOUDFLARE_R2_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          MISSING=""
          [ -z "$CLOUDFLARE_R2_API_TOKEN" ] && MISSING="$MISSING CLOUDFLARE_R2_API_TOKEN"
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && MISSING="$MISSING CLOUDFLARE_ACCOUNT_ID"
          [ -z "$R2_BACKUP_BUCKET" ] && MISSING="$MISSING R2_BACKUP_BUCKET"
          if [ -n "$MISSING" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::R2 시크릿 미등록 (누락:${MISSING})."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: R2에 업로드 (notion-payments/ prefix)
        if: steps.date_check.outputs.is_last_day == 'true' && steps.check_secrets.outputs.skip != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_R2_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          MONTH=$(TZ='Asia/Seoul' date +%Y-%m)
          KEY="notion-payments/${MONTH}.json.gz"
          echo "📤 업로드: ${R2_BACKUP_BUCKET}/${KEY}"
          npx --yes wrangler@latest r2 object put "${R2_BACKUP_BUCKET}/${KEY}" \
            --file=/tmp/notion-payments.json.gz \
            --content-type="application/gzip" \
            --remote
          echo "✅ R2 업로드 완료"

      - name: 성공 알림 (info, ops)
        if: steps.date_check.outputs.is_last_day == 'true' && success() && steps.check_secrets.outputs.skip != 'true'
        env:
          NTFY_TOPIC_OPS: ${{ secrets.NTFY_TOPIC_OPS }}
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          if [ -z "$NTFY_TOPIC_OPS" ]; then
            echo "::warning::NTFY_TOPIC_OPS 미등록 — 결제 백업 성공 알림 건너뜀"
            exit 0
          fi
          MONTH=$(TZ='Asia/Seoul' date +%Y-%m)
          SIZE_KB=$(awk "BEGIN{printf \"%.1f\", ${{ steps.backup.outputs.compressed_size }} / 1024}")
          MSG=$(printf '월간 결제 내역 백업 R2 업로드 완료 (5년 보존).\n결제: %s건\n크기: %s KB\n키: %s/notion-payments/%s.json.gz' \
            "${{ steps.backup.outputs.payment_count }}" \
            "$SIZE_KB" \
            "$R2_BACKUP_BUCKET" \
            "$MONTH")
          curl -fsS -X POST "https://ntfy.sh/$NTFY_TOPIC_OPS" \
            -H "Title: 결제 백업 완료 (5년)" \
            -H "Priority: 2" \
            -H "Tags: moneybag,white_check_mark" \
            -d "$MSG"

      - name: 실패 알림 (critical)
        if: steps.date_check.outputs.is_last_day == 'true' && failure()
        env:
          NTFY_TOPIC_CRITICAL: ${{ secrets.NTFY_TOPIC_CRITICAL }}
        run: |
          if [ -z "$NTFY_TOPIC_CRITICAL" ]; then exit 0; fi
          MSG=$(printf '월간 결제 백업 실패 (세법 5년 보존 의무).\n링크: %s/%s/actions/runs/%s' \
            "${{ github.server_url }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}")
          curl -fsS -X POST "https://ntfy.sh/$NTFY_TOPIC_CRITICAL" \
            -H "Title: 결제 백업 실패" \
            -H "Priority: 5" \
            -H "Tags: rotating_light,moneybag" \
            -d "$MSG"
