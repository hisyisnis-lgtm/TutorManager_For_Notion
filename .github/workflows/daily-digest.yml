name: 일일 운영 리포트

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 09:00 KST (= 00:00 UTC)
  workflow_dispatch:        # 수동 실행 가능

permissions:
  contents: read
  actions: read         # 워크플로우 실행 이력 조회용

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 일일 운영 리포트 생성 및 발송
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOPIC_DIGEST: ${{ secrets.NTFY_TOPIC_DIGEST }}
          NTFY_TOPIC_CRITICAL: ${{ secrets.NTFY_TOPIC_CRITICAL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          SOLAPI_API_KEY: ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
        run: node daily_digest.mjs
