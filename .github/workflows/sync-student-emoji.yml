name: 학생 이름 이모지 동기화

on:
  schedule:
    - cron: '0 23 * * 6'  # 일요일 KST 08:00 (UTC 토요일 23:00) — 학생 명단은 주 1회로 충분
  workflow_dispatch:

jobs:
  sync-emoji:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: 학생 이름 이모지 동기화 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOPIC_CRITICAL: ${{ secrets.NTFY_TOPIC_CRITICAL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: node sync_student_emoji.mjs
