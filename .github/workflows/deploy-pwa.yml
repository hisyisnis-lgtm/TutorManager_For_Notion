name: PWA 배포 (Cloudflare Pages)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - name: 버전 동기화 (git 태그 → package.json)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version
        working-directory: pwa

      - name: 의존성 설치
        run: npm ci
        working-directory: pwa

      - name: 아이콘 생성
        run: npm run generate-icons
        working-directory: pwa

      - name: PWA 빌드
        env:
          VITE_WORKER_URL: ${{ secrets.VITE_WORKER_URL }}
        run: npm run build
        working-directory: pwa

      - name: Cloudflare Pages 배포
        run: npx wrangler pages deploy dist --project-name=tiantian-chinese --branch=main --commit-message="${GITHUB_REF_NAME:-$(git rev-parse --short HEAD)}"
        working-directory: pwa
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
