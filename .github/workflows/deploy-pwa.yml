name: PWA 배포 (Cloudflare Pages)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: node_modules 캐시
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: pwa/node_modules
          key: ${{ runner.os }}-node24-${{ hashFiles('pwa/package-lock.json') }}

      - name: 버전 동기화 (git 태그 → package.json)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version
        working-directory: pwa

      - name: 의존성 설치
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "npm ci 실패 (시도 $i/3), 10초 후 재시도..."
            sleep 10
          done
        working-directory: pwa

      - name: 아이콘 생성
        run: npm run generate-icons
        working-directory: pwa

      - name: PWA 빌드
        env:
          VITE_WORKER_URL: ${{ secrets.VITE_WORKER_URL }}
        run: npm run build
        working-directory: pwa

      - name: Cloudflare Pages 배포
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: tiantian-chinese
          directory: pwa/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
