name: 학생 수업 전날 알림

on:
  schedule:
    - cron: '0 10 * * *'  # 매일 19:00 KST (= 10:00 UTC)
  workflow_dispatch:          # 수동 실행 가능

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 학생 전날 수업 리마인더 발송
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          SOLAPI_API_KEY: ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
          KAKAO_PFID: ${{ secrets.KAKAO_PFID }}
          KAKAO_TPL_STU_TOMORROW: ${{ secrets.KAKAO_TPL_STU_TOMORROW }}
        run: node notify_student_tomorrow.mjs
