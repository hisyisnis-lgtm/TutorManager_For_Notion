name: 월간 노션 아카이브 (R2, 익명화)

# 매월 1일 KST 04:00 (= 매월 1일 UTC 19:00 (전월 마지막날))
# 주간 백업과 시간대 분리 (주간은 매주 월요일 03:00 KST)
on:
  schedule:
    - cron: '0 19 28-31 * *'  # 매월 28~31일 UTC 19:00 → 한국시간 다음날 04:00
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monthly-archive
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 매월 1일 KST에만 실행되도록 마지막날 체크 (cron이 28-31 매일 도므로 필터)
      - name: 매월 마지막날 KST 확인
        id: date_check
        run: |
          # KST 기준 내일 날짜의 일자가 1이면 오늘이 마지막날
          KST_TOMORROW=$(TZ='Asia/Seoul' date -d 'tomorrow' +%d)
          if [ "$KST_TOMORROW" = "01" ]; then
            echo "is_last_day=true" >> "$GITHUB_OUTPUT"
            echo "✅ KST 기준 오늘이 월 마지막날 — 아카이브 실행"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_last_day=true" >> "$GITHUB_OUTPUT"
            echo "✅ 수동 트리거 — 아카이브 실행"
          else
            echo "is_last_day=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ KST 기준 마지막날 아님 (내일=${KST_TOMORROW}일) — 건너뜀"
          fi

      - uses: actions/checkout@v4
        if: steps.date_check.outputs.is_last_day == 'true'

      - uses: actions/setup-node@v4
        if: steps.date_check.outputs.is_last_day == 'true'
        with:
          node-version: '24'

      - name: Notion DB 9개 익명화 → 압축 파일 생성
        if: steps.date_check.outputs.is_last_day == 'true'
        id: archive
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOPIC_CRITICAL: ${{ secrets.NTFY_TOPIC_CRITICAL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          BACKUP_OUTPUT_PATH: /tmp/notion-archive.json.gz
        run: node archive_to_r2.mjs

      - name: R2 시크릿 등록 여부 확인
        if: steps.date_check.outputs.is_last_day == 'true'
        id: check_secrets
        env:
          CLOUDFLARE_R2_API_TOKEN: ${{ secrets.CLOUDFLARE_R2_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          MISSING=""
          [ -z "$CLOUDFLARE_R2_API_TOKEN" ] && MISSING="$MISSING CLOUDFLARE_R2_API_TOKEN"
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && MISSING="$MISSING CLOUDFLARE_ACCOUNT_ID"
          [ -z "$R2_BACKUP_BUCKET" ] && MISSING="$MISSING R2_BACKUP_BUCKET"
          if [ -n "$MISSING" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::R2 시크릿 미등록 (누락:${MISSING})."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: R2에 업로드 (notion-archive/ prefix)
        if: steps.date_check.outputs.is_last_day == 'true' && steps.check_secrets.outputs.skip != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_R2_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          MONTH=$(TZ='Asia/Seoul' date +%Y-%m)
          KEY="notion-archive/${MONTH}.json.gz"
          echo "📤 업로드: ${R2_BACKUP_BUCKET}/${KEY}"
          npx --yes wrangler@latest r2 object put "${R2_BACKUP_BUCKET}/${KEY}" \
            --file=/tmp/notion-archive.json.gz \
            --content-type="application/gzip" \
            --remote
          echo "✅ R2 업로드 완료"

      - name: 성공 알림 (info)
        if: steps.date_check.outputs.is_last_day == 'true' && success() && steps.check_secrets.outputs.skip != 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then exit 0; fi
          MONTH=$(TZ='Asia/Seoul' date +%Y-%m)
          SIZE_KB=$(awk "BEGIN{printf \"%.1f\", ${{ steps.archive.outputs.compressed_size }} / 1024}")
          MSG=$(printf '월간 익명화 아카이브 R2 업로드 완료.\n학생: %s명 / 무료상담: %s건\n총 페이지: %s개\n크기: %s KB\n키: %s/notion-archive/%s.json.gz' \
            "${{ steps.archive.outputs.student_count }}" \
            "${{ steps.archive.outputs.consult_count }}" \
            "${{ steps.archive.outputs.total_pages }}" \
            "$SIZE_KB" \
            "$R2_BACKUP_BUCKET" \
            "$MONTH")
          HEADERS=(-H "Title: 월간 아카이브 완료" -H "Priority: 2" -H "Tags: file_cabinet,white_check_mark")
          if [ -n "$NTFY_TOKEN" ]; then HEADERS+=(-H "Authorization: Bearer $NTFY_TOKEN"); fi
          curl -fsS -X POST "https://ntfy.sh/$NTFY_TOPIC" "${HEADERS[@]}" -d "$MSG"

      - name: 실패 알림 (critical)
        if: steps.date_check.outputs.is_last_day == 'true' && failure()
        env:
          NTFY_TOPIC_CRITICAL: ${{ secrets.NTFY_TOPIC_CRITICAL }}
        run: |
          if [ -z "$NTFY_TOPIC_CRITICAL" ]; then exit 0; fi
          MSG=$(printf '월간 익명화 아카이브 실패.\n링크: %s/%s/actions/runs/%s' \
            "${{ github.server_url }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}")
          curl -fsS -X POST "https://ntfy.sh/$NTFY_TOPIC_CRITICAL" \
            -H "Title: 월간 아카이브 실패" \
            -H "Priority: 5" \
            -H "Tags: rotating_light,file_cabinet" \
            -d "$MSG"
