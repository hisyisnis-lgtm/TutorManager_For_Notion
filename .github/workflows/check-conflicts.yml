name: 수업 충돌 감지

on:
  repository_dispatch:
    types: [conflict-check]
  schedule:
    - cron: '*/30 * * * *'  # 30분마다 실행
  workflow_dispatch:          # 수동 실행 가능

jobs:
  check-conflicts:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 충돌 감지 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          SOLAPI_API_KEY: ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
          KAKAO_PFID: ${{ secrets.KAKAO_PFID }}
          MY_PHONE: ${{ secrets.MY_PHONE }}
          KAKAO_TPL_CONFLICT: ${{ secrets.KAKAO_TPL_CONFLICT }}
        run: node check_conflicts.mjs
