name: 수업 충돌 감지

on:
  repository_dispatch:
    types: [conflict-check]
  schedule:
    - cron: '0 */4 * * *'  # 4시간마다 (강사가 수업 추가하는 시점에만 충돌 발생 → Worker 웹훅 dispatch 병행)
  workflow_dispatch:

jobs:
  check-conflicts:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 충돌 감지 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOPIC_CRITICAL: ${{ secrets.NTFY_TOPIC_CRITICAL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          SOLAPI_API_KEY: ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
          KAKAO_PFID: ${{ secrets.KAKAO_PFID }}
          MY_PHONE: ${{ secrets.MY_PHONE }}
          KAKAO_TPL_CONFLICT: ${{ secrets.KAKAO_TPL_CONFLICT }}
        run: node check_conflicts.mjs
