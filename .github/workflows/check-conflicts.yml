name: 수업 충돌 감지

on:
  repository_dispatch:
    types: [conflict-check]
  schedule:
    - cron: '*/30 * * * *'  # 30분마다 실행
  workflow_dispatch:          # 수동 실행 가능

jobs:
  check-conflicts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 충돌 감지 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node check_conflicts.mjs
