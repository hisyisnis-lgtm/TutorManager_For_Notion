name: 내일 수업 알림

on:
  schedule:
    - cron: '0 5 * * *'  # 매일 14:00 KST (= 05:00 UTC)
  workflow_dispatch:          # 수동 실행 가능

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 내일 수업 알림 전송
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          SOLAPI_API_KEY: ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
          KAKAO_PFID: ${{ secrets.KAKAO_PFID }}
          MY_PHONE: ${{ secrets.MY_PHONE }}
          KAKAO_TPL_UPCOMING: ${{ secrets.KAKAO_TPL_UPCOMING }}
        run: node notify_upcoming_classes.mjs
