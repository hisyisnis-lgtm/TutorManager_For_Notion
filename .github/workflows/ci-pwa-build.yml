name: PWA 빌드 검증 (CI)

on:
  push:
    branches: [main]
    paths:
      - 'pwa/**'
      - '.github/workflows/ci-pwa-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pwa/**'
      - '.github/workflows/ci-pwa-build.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-pwa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: PWA 빌드
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: node_modules 캐시
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: pwa/node_modules
          key: ${{ runner.os }}-node24-${{ hashFiles('pwa/package-lock.json') }}

      - name: 의존성 설치
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "npm ci 실패 (시도 $i/3), 10초 후 재시도..."
            sleep 10
          done
        working-directory: pwa

      - name: 아이콘 생성
        run: npm run generate-icons
        working-directory: pwa

      - name: 빌드 검증
        run: npm run build
        working-directory: pwa

      - name: 알림 (실패 시)
        if: failure()
        env:
          NTFY_TOPIC_CRITICAL: ${{ secrets.NTFY_TOPIC_CRITICAL }}
        run: |
          if [ -z "$NTFY_TOPIC_CRITICAL" ]; then exit 0; fi
          MSG=$(printf 'main 브랜치 PWA 빌드가 실패했습니다.\n커밋: %s\n링크: %s/%s/actions/runs/%s' \
            "${{ github.sha }}" \
            "${{ github.server_url }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}")
          curl -fsS -X POST "https://ntfy.sh/$NTFY_TOPIC_CRITICAL" \
            -H "Title: PWA 빌드 실패" \
            -H "Priority: 5" \
            -H "Tags: rotating_light,package" \
            -d "$MSG"
